# ========================================
# OceanVerse — 智慧海洋探索平台 配置文件
# ========================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: oceanverse

  # ==================== 数据源 ====================
  datasource:
    type: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oceanverse?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root  # TODO: 修改为你的数据库密码
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      password:       # TODO: 如果 Redis 有密码请填写
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000

  # ==================== RabbitMQ (可选) ====================
  # rabbitmq:
  #   host: localhost
  #   port: 5672
  #   username: guest
  #   password: guest

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  # ==================== Jackson ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ==================== MyBatis Plus ====================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== SpringDoc (Swagger) ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ==================== 日志 ====================
logging:
  level:
    com.oceanverse: debug
    org.springframework: info
