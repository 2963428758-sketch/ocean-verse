# ========================================
# OceanVerse — 智慧海洋探索平台 配置文件
# ========================================
# 敏感配置（密码、API Key 等）已拆分至 application-local.yml（gitignore 已排除）
# 部署时通过环境变量注入：DB_PASSWORD, DASHSCOPE_API_KEY, OSS_ACCESS_KEY_ID, OSS_ACCESS_KEY_SECRET

spring:
  # 导入本地敏感配置文件（可选，文件不存在时不报错）
  config:
    import: optional:classpath:application-local.yml

  application:
    name: oceanverse

  # ==================== 数据源 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oceanverse?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
#      password:
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  # ==================== Jackson ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ==================== Spring AI (DashScope 通义千问) ====================
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3

# ==================== 自定义 AI 模型配置 ====================
oceanverse:
  ai:
    image-model: qwen-vl-max
    chat-model: qwen-plus
    embedding-model: text-embedding-v3
    max-tokens: 2048
    temperature: 0.7
    similarity-threshold: 0.7
    session-ttl-minutes: 30
    vector-store-path: data/ai/vector-store.json
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: oceanverse
    dir-prefix: uploads

# ==================== MyBatis Plus ====================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== SpringDoc (Swagger) ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ==================== 日志 ====================
logging:
  level:
    com.oceanverse: debug
    org.springframework: info
